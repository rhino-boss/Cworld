<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爬山 · Cworld</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f4f0;
      --surface: #ffffff;
      --border: #dde2d8;
      --green-dark: #2d4a2d;
      --green-mid: #4a7c59;
      --green-light: #7fb08a;
      --text-primary: #1a1a1a;
      --text-secondary: #5a6b5a;
      --visited: #e85d2f;
      --unvisited: #9ab5a0;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      font-family: 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Top nav ── */
    nav {
      background: var(--green-dark);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 52px;
    }
    nav a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.85rem;
    }
    nav a:hover { color: #fff; }
    nav span { color: rgba(255,255,255,0.3); font-size: 0.85rem; }
    nav .current { color: #fff; font-weight: 600; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--green-dark) 0%, #3a6b4a 100%);
      padding: 40px 48px 36px;
      color: #fff;
    }
    .hero h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.3px; }
    .hero p { margin-top: 6px; font-size: 0.9rem; opacity: 0.7; }

    /* ── Stats bar ── */
    .stats {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 48px;
      display: flex;
      gap: 40px;
      align-items: center;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--green-dark); line-height: 1; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 3px; }
    .stat-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-mid), var(--green-light));
      border-radius: 99px;
      transition: width 0.8s ease;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: calc(100vh - 52px - 88px - 65px);
      min-height: 500px;
    }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header h2 { font-size: 0.95rem; font-weight: 700; flex: 1; }

    .search-box {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      background: var(--bg);
      color: var(--text-primary);
      margin-top: 10px;
    }
    .search-box:focus { outline: 2px solid var(--green-mid); border-color: transparent; }

    .filter-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .tab.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

    .peak-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    .peak-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid #f5f5f3;
    }
    .peak-item:hover { background: var(--bg); }

    .peak-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--unvisited);
    }
    .peak-dot.visited { background: var(--visited); }

    .peak-info { flex: 1; min-width: 0; }
    .peak-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .peak-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 1px; }

    .peak-badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 99px;
      background: #ffeee8;
      color: var(--visited);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Leaflet custom markers ── */
    .marker-visited {
      width: 14px; height: 14px;
      background: var(--visited);
      border: 2.5px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 6px rgba(232,93,47,0.5);
    }
    .marker-unvisited {
      width: 10px; height: 10px;
      background: var(--unvisited);
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18) !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .popup-inner { padding: 16px 18px; min-width: 200px; }
    .popup-title { font-size: 1rem; font-weight: 700; color: var(--green-dark); }
    .popup-sub { font-size: 0.78rem; color: var(--text-secondary); margin-top: 3px; }
    .popup-photos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      margin-top: 10px;
    }
    .popup-photos img {
      width: 100%; height: 90px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
    }
    .popup-photos img:first-child:only-child {
      grid-column: span 2;
      height: 130px;
    }
    .popup-no-photo {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }

    /* ── Light box ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
    #lightbox-close {
      position: fixed; top: 20px; right: 24px;
      color: #fff; font-size: 2rem; cursor: pointer; line-height: 1;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 60vh auto; height: auto; }
      .hero { padding: 24px; }
      .stats { padding: 12px 24px; gap: 20px; }
      .sidebar { height: 320px; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>

  {name:"喀西帕南山",    alt:3005, lat:22.6281, lng:120.9169, region:"大武山群"},
  // 玉山南段
  {name:"特富野大山",    alt:3282, lat:23.3953, lng:120.9069, region:"玉山群"},
  {name:"大塔山",        alt:2663, lat:23.4461, lng:120.8781, region:"玉山群"},
  // 合歡延伸
  {name:"奇萊連峰",      alt:3060, lat:24.1650, lng:121.3150, region:"奇萊山群"},
  // 太平山區
  {name:"南湖東南峰",    alt:3550, lat:24.3500, lng:121.4900, region:"南湖大山群"},
  // 桃源山
  {name:"佳陽山",        alt:3314, lat:24.3550, lng:121.2650, region:"雪山群"},
  // 雪山南稜
  {name:"雪山尾稜",      alt:3100, lat:24.3650, lng:121.2450, region:"雪山群"},
  // 中央山脈北段
  {name:"布拉克桑北峰",  alt:3050, lat:24.3700, lng:121.3450, region:"中央山脈"},
  {name:"南湖溪山",      alt:3170, lat:24.3300, lng:121.4100, region:"南湖大山群"},
  // 玉山群尾峰
  {name:"阿桑來戛山",    alt:3020, lat:23.4800, lng:120.9800, region:"玉山群"},
  {name:"大分山",        alt:3047, lat:23.5300, lng:121.1000, region:"玉山群"},
];

// ════════════════════════════════════════════════════════════════
// 地圖初始化
// ════════════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [23.8, 121.0],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 18,
}).addTo(map);

// 標記 & popup 工廠
const markers = {};

function makeIcon(visited) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-${visited ? 'visited' : 'unvisited'}"></div>`,
    iconSize: visited ? [14, 14] : [10, 10],
    iconAnchor: visited ? [7, 7] : [5, 5],
  });
}

function buildPopup(peak, info) {
  const visitedBadge = info
    ? `<div style="font-size:0.72rem;color:#e85d2f;font-weight:700;margin-top:4px;">✓ 已完成${info.date ? ' · ' + info.date : ''}</div>`
    : '';

  let photosHtml = '';
  if (info && info.photos && info.photos.length > 0) {
    photosHtml = `<div class="popup-photos">` +
      info.photos.map(src =>
        `<img src="${src}" alt="" onclick="openLightbox('${src}')" />`
      ).join('') +
    `</div>`;
  } else if (info) {
    photosHtml = `<div class="popup-no-photo">📷 尚未上傳照片</div>`;
  }

  return `
    <div class="popup-inner">
      <div class="popup-title">${peak.name}</div>
      <div class="popup-sub">${peak.region} · ${peak.alt.toLocaleString()} m</div>
      ${visitedBadge}
      ${photosHtml}
    </div>`;
}

PEAKS.forEach(peak => {
  const info = VISITED[peak.name];
  const marker = L.marker([peak.lat, peak.lng], { icon: makeIcon(!!info) })
    .addTo(map)
    .bindPopup(buildPopup(peak, info), { maxWidth: 280 });
  markers[peak.name] = { marker, peak, info };
});

// ════════════════════════════════════════════════════════════════
// 側欄列表
// ════════════════════════════════════════════════════════════════
let currentFilter = 'all';
let searchQuery = '';

function renderList() {
  const list = document.getElementById('peak-list');
  const filtered = PEAKS.filter(p => {
    const vis = !!VISITED[p.name];
    if (currentFilter === 'visited' && !vis) return false;
    if (currentFilter === 'unvisited' && vis) return false;
    if (searchQuery && !p.name.includes(searchQuery) && !p.region.includes(searchQuery)) return false;
    return true;
  });

  list.innerHTML = filtered.map(p => {
    const vis = !!VISITED[p.name];
    return `
      <div class="peak-item" onclick="flyTo('${p.name}')">
        <div class="peak-dot ${vis ? 'visited' : ''}"></div>
        <div class="peak-info">
          <div class="peak-name">${p.name}</div>
          <div class="peak-meta">${p.region} · ${p.alt.toLocaleString()} m</div>
        </div>
        ${vis ? '<span class="peak-badge">✓</span>' : ''}
      </div>`;
  }).join('');
}

function flyTo(name) {
  const entry = markers[name];
  if (!entry) return;
  map.flyTo([entry.peak.lat, entry.peak.lng], 12, { duration: 0.8 });
  setTimeout(() => entry.marker.openPopup(), 900);
}

// 統計
function updateStats() {
  const count = Object.keys(VISITED).length;
  const pct = Math.round(count / PEAKS.length * 100);
  document.getElementById('count-visited').textContent = count;
  document.getElementById('count-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

// Filter tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderList();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

// ════════════════════════════════════════════════════════════════
// Lightbox
// ════════════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

// Init
updateStats();
renderList();
</script>
</body>
</html>
