const KEY = 'peaksSmallDone';
let doneSet = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));
let currentTab = 'all', currentRegion = 'all';

const allRegions = [...new Set(SMALL_100.map(p => p.region))].sort();

const rf = document.getElementById('regionFilter');
rf.innerHTML = `<button class="filter-pill active" onclick="setRegion(this,'all')">全部縣市</button>` +
  allRegions.map(r => `<button class="filter-pill" onclick="setRegion(this,'${r}')">${r}</button>`).join('');

function save() { localStorage.setItem(KEY, JSON.stringify([...doneSet])); }
function toggle(name) {
  if (doneSet.has(name)) doneSet.delete(name);
  else doneSet.add(name);
  save(); render();
}
function switchTab(btn, t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentTab = t; render();
}
function setRegion(btn, r) {
  document.querySelectorAll('#regionFilter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentRegion = r; render();
}

function render() {
  let filtered = SMALL_100.filter(p => {
    const tabOk = currentTab==='all'||(currentTab==='done'?doneSet.has(p.name):!doneSet.has(p.name));
    const regionOk = currentRegion==='all'||p.region===currentRegion;
    return tabOk && regionOk;
  });

  const done = doneSet.size;
  document.getElementById('progressFill').style.width = done + '%';
  document.getElementById('doneCount').textContent = `${done} / 100 座已完成`;
  document.getElementById('pct').textContent = done + '%';

  const list = document.getElementById('peakList');
  if (!filtered.length) { list.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>沒有符合條件的山</p></div>`; return; }

  const groups = {};
  filtered.forEach(p => { (groups[p.region]||(groups[p.region]=[])).push(p); });

  list.innerHTML = Object.entries(groups).map(([region, peaks]) => `
    <div class="series-header">${region}</div>
    <div class="peak-list">
      ${peaks.map(p => {
        const d = doneSet.has(p.name);
        return `<div class="peak-item ${d?'done':''}" onclick="toggle('${p.name.replace(/'/g,"\\'")}')">
          <div class="peak-check">${d?'✓':''}</div>
          <span class="peak-name">${p.name}</span>
          <span class="peak-altitude">${p.alt.toLocaleString()} m</span>
          <span class="peak-level">小百岳</span>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

render();
