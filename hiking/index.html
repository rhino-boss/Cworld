<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的登山紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="icon">⛰️</span>我的登山紀錄</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">首頁</a></li>
      <li><a href="records.html">紀錄列表</a></li>
      <li class="has-dropdown">
        <a href="#" class="dropdown-trigger">制霸地圖 ▾</a>
        <ul class="dropdown-menu">
          <li><a href="peaks.html">百岳制霸地圖</a></li>
          <li><a href="peaks-small.html">小百岳制霸地圖</a></li>
          <li><a href="peaks-285.html">285峰制霸地圖</a></li>
        </ul>
      </li>
      <li><a href="gear.html">裝備清單</a></li>
    </ul>
  </div>
</nav>

<main class="page">
  <h1 class="page-title">嗨 👋</h1>
  <p class="page-subtitle">開始記錄你的登山旅程吧</p>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-unit">次</div><div class="stat-label">登山次數</div></div>
    <div class="stat-card"><div class="stat-num" id="s-gain">0</div><div class="stat-unit">公尺</div><div class="stat-label">累計爬升</div></div>
    <div class="stat-card"><div class="stat-num" id="s-dist">0</div><div class="stat-unit">公里</div><div class="stat-label">總距離</div></div>
    <div class="stat-card"><div class="stat-num" id="s-100">0</div><div class="stat-unit">座</div><div class="stat-label">百岳完成</div></div>
  </div>

  <div class="section-header">
    <span class="section-title">最近紀錄</span>
    <a href="records.html" class="section-link">查看全部 →</a>
  </div>

  <div id="recentCards">
    <div class="empty"><div class="icon">🏔</div><p>還沒有紀錄，<a href="records.html" style="color:var(--green-mid)">前往新增</a>第一筆吧！</p></div>
  </div>

  <div class="section-header" style="margin-top:40px;"><span class="section-title">快速入口</span></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <a href="records.html" class="btn btn-primary">＋ 新增紀錄</a>
    <a href="peaks.html" class="btn btn-outline">🗒 百岳進度</a>
    <a href="gear.html" class="btn btn-outline">🎒 裝備清單</a>
  </div>
</main>

<footer class="footer">© 2026 我的登山紀錄 · 自用靜態站</footer>

<script>
  // Load stats from localStorage
  const records = JSON.parse(localStorage.getItem('hikeRecords') || '[]');
  document.getElementById('s-total').textContent = records.length;
  const totalGain = records.reduce((s,r) => s + (Number(r.gain)||0), 0);
  const totalDist = records.reduce((s,r) => s + (Number(r.distance)||0), 0);
  document.getElementById('s-gain').textContent = totalGain.toLocaleString();
  document.getElementById('s-dist').textContent = totalDist.toFixed(1);

  // Recent 3 records
  const recent = [...records].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  if (recent.length) {
    document.getElementById('recentCards').innerHTML = `
      <div class="cards-grid">
        ${recent.map((r,i) => `
          <a href="records.html" class="record-card">
            <div class="record-card-img">${r.emoji||'🏔'}</div>
            <div class="record-card-body">
              <div class="record-card-title">${r.name}</div>
              <div class="record-card-meta">
                <span class="meta-chip">📅 ${r.date}</span>
                ${r.distance ? `<span class="meta-chip">📏 ${Number(r.distance).toFixed(1)} km</span>` : ''}
                ${r.gain ? `<span class="meta-chip">⬆️ ${Number(r.gain).toLocaleString()} m</span>` : ''}
              </div>
              <div class="record-card-tags">
                ${r.category ? `<span class="tag">${r.category}</span>` : ''}
                ${r.weight ? `<span class="tag">🎒 ${r.weight}kg</span>` : ''}
              </div>
            </div>
          </a>`).join('')}
      </div>`;
  }
</script>
</body>
</html>
