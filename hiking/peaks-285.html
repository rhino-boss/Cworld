const KEY = 'peaks285done';
let doneSet = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));
let currentTab = 'all', currentSeries = 'all';

const allSeries = [...new Set(PEAKS_285.map(p => p.series))];

// Build series filter
const sf = document.getElementById('seriesFilter');
sf.innerHTML = `<button class="filter-pill active" onclick="setSeries(this,'all')">全部山系</button>` +
  allSeries.map(s => `<button class="filter-pill" onclick="setSeries(this,'${s}')">${s}</button>`).join('');

function save() { localStorage.setItem(KEY, JSON.stringify([...doneSet])); }

function toggle(name) {
  if (doneSet.has(name)) doneSet.delete(name);
  else doneSet.add(name);
  save(); render();
}

function switchTab(btn, t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = t; render();
}
function setSeries(btn, s) {
  document.querySelectorAll('#seriesFilter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSeries = s; render();
}

function render() {
  let filtered = PEAKS_285.filter(p => {
    const tabOk = currentTab==='all'
      || (currentTab==='done'?doneSet.has(p.name)
      :currentTab==='todo'?!doneSet.has(p.name)
      :p.is100);
    const seriesOk = currentSeries==='all' || p.series===currentSeries;
    return tabOk && seriesOk;
  });

  const done = doneSet.size;
  const pct = ((done/285)*100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('doneCount').textContent = `${done} / 285 座已完成`;
  document.getElementById('pct').textContent = pct + '%';

  const groups = {};
  filtered.forEach(p => { (groups[p.series]||(groups[p.series]=[])).push(p); });

  const list = document.getElementById('peakList');
  if (!filtered.length) { list.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>沒有符合條件的山</p></div>`; return; }

  list.innerHTML = Object.entries(groups).map(([series, peaks]) => `
    <div class="series-header">${series}（${peaks.length}座）</div>
    <div class="peak-list">
      ${peaks.map(p => {
        const d = doneSet.has(p.name);
        return `<div class="peak-item ${d?'done':''}" onclick="toggle('${p.name.replace(/'/g,"\\'")}')">
          <div class="peak-check">${d?'✓':''}</div>
          <span class="peak-name">${p.name}</span>
          <span class="peak-altitude">${p.alt.toLocaleString()} m</span>
          ${p.is100 ? `<span class="tag-100">百岳</span>` : ''}
          ${p.isNew ? `<span class="tag-new">上河新增</span>` : ''}
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

render();
